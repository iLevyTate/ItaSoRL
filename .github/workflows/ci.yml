name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # NOTE: re-enable `cache: pip` once the repo has a
          # requirements.txt / pyproject.toml for the cache key to hash.

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the project + dev tooling if the repo declares any.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if ls pyproject.toml setup.py setup.cfg >/dev/null 2>&1; then pip install -e . || true; fi
          pip install ruff pytest

      - name: Lint (ruff)
        run: |
          if ls **/*.py >/dev/null 2>&1 || ls *.py >/dev/null 2>&1; then
            ruff check .
            ruff format --check .
          else
            echo "No Python files yet — skipping ruff."
          fi

      - name: Test (pytest)
        run: |
          # Run only if there are tests; an empty suite must not fail CI.
          if git ls-files '*test_*.py' '*_test.py' 'tests/**.py' | grep -q .; then
            pytest -q
          else
            echo "No tests found yet — skipping pytest."
          fi

  shell:
    name: Shellcheck Ralph loop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck ralph/ralph.sh
