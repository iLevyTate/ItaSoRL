<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ItaSoRL - Detectable is not learned</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Hanken+Grotesk:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="stage">
    <div id="world-card" class="layer">
      <canvas id="world" width="960" height="960"></canvas>
      <div class="pool-chip" id="chip-a"><span class="chip-label"></span><span class="chip-sub"></span></div>
      <div class="pool-chip" id="chip-b"><span class="chip-label"></span><span class="chip-sub"></span></div>
    </div>

    <div id="gauge" class="layer">
      <div id="gauge-head">
        <div id="gauge-label"></div>
        <div id="gauge-source"></div>
      </div>
      <div id="gauge-legend">shown one real world + one fake - how often it picks the fake</div>
      <div id="gauge-row">
        <div id="gauge-track">
          <div id="gauge-fill"></div>
          <div id="gauge-mid"></div>
          <div id="gauge-ref"></div>
          <div id="gauge-ref-label"></div>
        </div>
        <div id="gauge-value">50%</div>
      </div>
      <div id="gauge-scale"><span>0%</span><span id="gauge-mid-label">50% - coin flip</span><span>100% - always right</span></div>
    </div>

    <div id="caption" class="layer">
      <div id="kicker"></div>
      <div id="headline"></div>
      <div id="subline"></div>
    </div>

    <div id="endcard" class="layer">
      <div class="glyph blob-glyph"></div>
      <div id="end-headline"></div>
      <div id="end-recap"></div>
      <div id="end-url"></div>
      <div id="end-foot"></div>
    </div>
  </div>

  <!-- Transport bar: browser viewing only. The capture rig hides it via
       window.__seek so it never appears in encoded film frames. -->
  <div id="controls">
    <button id="ctl-play" aria-label="Pause">&#x2016;</button>
    <input id="ctl-scrub" type="range" min="0" max="89999" step="100" value="0" aria-label="Seek">
    <div id="ctl-time">0:00 / 1:30</div>
  </div>

  <script src="player.js"></script>
</body>
</html>
